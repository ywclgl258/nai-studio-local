name: Release (auto-bump VERSION + notes)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0    # 完整历史，让 git log v{version}~1 能找到前一 tag
          fetch-tags: true

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"   # e.g. v1.0.6
          VER="${TAG#v}"              # 1.0.6
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Write VERSION file
        run: |
          echo "${{ steps.ver.outputs.version }}" > VERSION

      - name: Update CHANGELOG header
        run: |
          # 找最新未释放段，把 [Unreleased] 后的第一个 [version] 标日期为今天
          TODAY="$(date -u +%Y-%m-%d)"
          python3 - <<PY
          import re, pathlib, datetime
          p = pathlib.Path('CHANGELOG.md')
          text = p.read_text(encoding='utf-8')
          version = "${{ steps.ver.outputs.version }}"
          today = datetime.datetime.utcnow().strftime('%Y-%m-%d')
          # 替换首个 "## [<version>] - YYYY-MM-DD" 或 "## [<version>]" 为带今天日期
          pat = re.compile(r'(##\s*\\[' + re.escape(version) + r'\\]\s*-\s*)\\d{4}-\\d{2}-\\d{2}')
          if not pat.search(text):
              pat2 = re.compile(r'(##\s*\\[' + re.escape(version) + r'\\])(?!\s*-\s*\\d)')
              text = pat2.sub(r'\\1 - ' + today, text, count=1)
          else:
              text = pat.sub(r'\\1' + today, text, count=1)
          p.write_text(text, encoding='utf-8')
          PY

      - name: Extract CHANGELOG section for this version
        id: notes
        run: |
          python3 - <<'PY' > /tmp/release_notes.md
          import re, pathlib
          text = pathlib.Path('CHANGELOG.md').read_text(encoding='utf-8')
          version = "${{ steps.ver.outputs.version }}"
          # 找 "## [version]" 到下一个 "## [" 之前
          m = re.search(r'^##\s*\[' + re.escape(version) + r'\][^\n]*\n(.*?)(?=^##\s*\[|\Z)',
                        text, re.MULTILINE | re.DOTALL)
          if m:
              print(m.group(1).rstrip())
          else:
              # fallback: 找上一个 tag 之后的 commit log
              import subprocess
              out = subprocess.run(['git', 'log', '--pretty=format:- %s', f'v{version}~1..HEAD'],
                                   capture_output=True, text=True).stdout
              print(out or f'Release v{version}')
          PY
          cat /tmp/release_notes.md
          echo "---END---"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(release): v${{ steps.ver.outputs.version }}"
          # workflow 在 detached HEAD（tag 模式）下运行，需要显式推到 master
          git push origin HEAD:master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          body_path: /tmp/release_notes.md
          files: |
            README.md
            CHANGELOG.md
          fail_on_unmatched_files: false
