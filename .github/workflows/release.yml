name: Release

# 触发：push tag `v*` 时自动生成 GitHub Release
# 用法：本地打 tag → push
#   git tag v1.0.1
#   git push origin v1.0.1
# → GitHub Actions 自动跑这个 workflow，从 CHANGELOG 提取对应版本的 notes 发布到 Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # strip leading 'v'
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract CHANGELOG section for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(python3 -c "
          import re, sys
          with open('CHANGELOG.md', encoding='utf-8') as f:
              text = f.read()
          ver = '[' + sys.argv[1] + ']'
          m = re.search(r'^## ' + re.escape(ver) + r'.*?\n(.*?)(?=^## \[|\Z)', text, re.S | re.M)
          if m:
              print(m.group(1).rstrip())
          else:
              print('', end='')
          " "$VERSION")

          # fallback: 如果 CHANGELOG 没找到，用 commits
          if [ -z "$BODY" ]; then
            echo "::warning::No CHANGELOG entry for $VERSION, falling back to commits"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              BODY=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges)
            else
              BODY=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
            fi
          fi

          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          # 不打 draft，让用户直接在 Releases 看到
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          # 附加 README + CHANGELOG 让用户下载
          files: |
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}